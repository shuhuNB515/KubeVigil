apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kubevigil.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubevigil.labels" . | nindent 4 }}
data:
  config.yaml: |
    probe:
      execve: {{ .Values.probe.execve }}
      open: {{ .Values.probe.open }}
      connect: {{ .Values.probe.connect }}
      ringBufferSize: {{ .Values.probe.ringBufferSize }}
    rules:
      rulesFile: /etc/kubevigil/rules.yaml
    response:
      enabled: {{ .Values.response.enabled }}
      defaultAction: {{ .Values.response.defaultAction }}
      isolationLabelKey: {{ .Values.response.isolationLabelKey }}
      isolationLabelValue: {{ .Values.response.isolationLabelValue }}
      highSeverityAction: {{ .Values.response.highSeverityAction }}
    logLevel: {{ .Values.logLevel }}
  {{- if .Values.rules.custom }}
  rules.yaml: |
    {{ .Values.rules.content | nindent 4 }}
  {{- else }}
  rules.yaml: |
    rules:
      - name: reverse-shell-detected
        description: "检测容器内可能的反弹 Shell 行为"
        eventType: execve
        severity: critical
        action: kill
        enabled: true
        execve:
          blockedProcesses:
            - nc
            - ncat
            - socat
          blockedArgs:
            - "-e /bin/"
            - "/dev/tcp/"
            - "reverse"

      - name: suspicious-download
        description: "检测容器内可疑的文件下载行为"
        eventType: execve
        severity: high
        action: label
        enabled: true
        execve:
          blockedProcesses:
            - wget
            - curl
          blockedArgs:
            - "| bash"
            - "| sh"
            - "| /bin/sh"

      - name: crypto-mining
        description: "检测容器内可能的加密货币挖矿行为"
        eventType: execve
        severity: critical
        action: kill
        enabled: true
        execve:
          blockedProcesses:
            - xmrig
            - minerd
            - cpuminer
            - cryptonight

      - name: sensitive-file-access
        description: "检测对敏感文件的非授权访问"
        eventType: open
        severity: high
        action: label
        enabled: true
        open:
          sensitivePaths:
            - /etc/shadow
            - /etc/passwd
            - /var/run/secrets/kubernetes.io/
            - /etc/kubernetes/
            - /root/.ssh/
            - /root/.kube/
          excludeProcesses:
            - kubevigil
            - kubelet

      - name: c2-communication
        description: "检测与已知 C2 服务器的通信"
        eventType: connect
        severity: critical
        action: network_policy
        enabled: true
        connect:
          blockedCIDRs:
            - "203.0.113.0/24"
            - "198.51.100.0/24"
          blockedPorts:
            - 4444
            - 5555
            - 6666
            - 7777
            - 8888
  {{- end }}
